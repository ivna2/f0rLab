<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Администраторы | Fitness Club</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
        document.documentElement.setAttribute(
            "data-theme",
            localStorage.getItem("fitnessclub-theme")
            || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        );
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body>
<div class="theme-fab">
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Переключить тему">
        <span class="theme-toggle-thumb"></span>
        <span class="theme-toggle-track"><span>☀️</span><span>🌙</span></span>
    </button>
</div>
<main class="page-shell">
    <header class="panel app-header">
        <div class="header-meta">
            <p class="hero-kicker">Admin Access</p>
            <h1 class="page-title">Администраторы</h1>
            <p class="page-subtitle">Список всех административных учетных записей и управление ими.</p>
        </div>
        <div class="header-actions">
            <a href="/admin/dashboard" class="link-button button-secondary">Назад в панель</a>
        </div>
    </header>

    <div th:if="${errorMessage}" class="status-banner error" data-auto-dismiss th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="status-banner success" data-auto-dismiss th:text="${successMessage}"></div>

    <section class="table-card">
        <div class="notification-header">
            <div>
                <p class="section-kicker">Доступ</p>
                <h2 class="section-title">Список администраторов</h2>
            </div>
            <span class="stats-badge" th:text="${admins.size() + ' admin'}"></span>
        </div>

        <div class="table-wrap spaced-top">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Логин</th>
                    <th>Email</th>
                    <th>Member ID</th>
                    <th>Роли</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="admin : ${admins}">
                    <td th:text="${admin.id}"></td>
                    <td th:text="${admin.login}"></td>
                    <td class="wrap-cell" th:text="${admin.email}"></td>
                    <td th:text="${admin.memberId != null ? admin.memberId : '-'}"></td>
                    <td th:text="${admin.roles}"></td>
                    <td>
                        <form th:action="@{/admin/admins/{id}/delete(id=${admin.id})}" method="post" data-confirm-message="Удалить этого администратора?">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="button button-danger" type="submit">Удалить</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${admins.isEmpty()}" class="empty-state spaced-top">
            Администраторы не найдены.
        </div>
    </section>
</main>
<script src="/js/theme.js"></script>
</body>
</html>
