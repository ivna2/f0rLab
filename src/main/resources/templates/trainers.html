<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Тренеры | Fitness Club</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script>
        document.documentElement.setAttribute(
            "data-theme",
            localStorage.getItem("fitnessclub-theme")
            || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        );
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body>
<div class="theme-fab">
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Переключить тему">
        <span class="theme-toggle-thumb"></span>
        <span class="theme-toggle-track"><span>☀️</span><span>🌙</span></span>
    </button>
</div>
<main class="page-shell">
    <header class="panel app-header">
        <div class="header-meta">
            <p class="hero-kicker">Admin CRUD</p>
            <h1 class="page-title">Тренеры</h1>
            <p class="page-subtitle">Управление составом тренеров и их специализациями.</p>
        </div>
        <div class="header-actions">
            <a href="/admin/dashboard" class="link-button button-secondary">Назад в панель</a>
        </div>
    </header>

    <div th:if="${errorMessage}" class="status-banner error" data-auto-dismiss th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="status-banner success" data-auto-dismiss th:text="${successMessage}"></div>

    <section class="app-grid crud-col">
        <section class="table-card">
            <p class="section-kicker">Команда</p>
            <h2 class="section-title">Список тренеров</h2>
            <div class="table-wrap spaced-top">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Специализация</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t : ${trainers}">
                        <td th:text="${t.id}"></td>
                        <td th:text="${t.name}"></td>
                        <td th:text="${t.specialization}"></td>
                        <td>
                            <form th:action="@{/trainers/delete/{id}(id=${t.id})}" method="post" data-confirm-message="Удалить тренера?">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button class="button button-danger" type="submit">Удалить</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${trainers.isEmpty()}" class="empty-state spaced-top">Тренеров пока нет. Добавьте первого специалиста через форму справа.</div>
        </section>

        <aside class="panel">
            <p class="section-kicker">Создание</p>
            <h2 class="section-title">Новый тренер</h2>
            <form th:action="@{/trainers/add}" method="post" class="form-stack spaced-top">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="field">
                    <label for="name">Имя</label>
                    <input id="name" name="name" required placeholder="Анна Петрова">
                </div>
                <div class="field">
                    <label for="specialization">Специализация</label>
                    <input id="specialization" name="specialization" required placeholder="Йога, пилатес, силовые">
                </div>
                <div class="action-row">
                    <button type="submit" class="button button-primary">Добавить</button>
                    <button type="reset" class="button button-secondary">Очистить</button>
                </div>
            </form>
        </aside>
    </section>
</main>
<script src="/js/theme.js"></script>
</body>
</html>
