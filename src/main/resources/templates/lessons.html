<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Занятия | Fitness Club</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script>
        document.documentElement.setAttribute(
            "data-theme",
            localStorage.getItem("fitnessclub-theme")
            || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
        );
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app-theme.css">
</head>
<body>
<div class="theme-fab">
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Переключить тему">
        <span class="theme-toggle-thumb"></span>
        <span class="theme-toggle-track"><span>☀️</span><span>🌙</span></span>
    </button>
</div>
<main class="page-shell">
    <header class="panel app-header">
        <div class="header-meta">
            <p class="hero-kicker">Admin CRUD</p>
            <h1 class="page-title">Занятия</h1>
            <p class="page-subtitle">Расписание тренировок, дата и вместимость для каждого слота.</p>
        </div>
        <div class="header-actions">
            <a href="/admin/dashboard" class="link-button button-secondary">Назад в панель</a>
        </div>
    </header>

    <div th:if="${errorMessage}" class="status-banner error" data-auto-dismiss th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="status-banner success" data-auto-dismiss th:text="${successMessage}"></div>

    <section class="app-grid crud-col">
        <section class="table-card">
            <p class="section-kicker">Расписание</p>
            <h2 class="section-title">Список занятий</h2>
            <div class="table-wrap spaced-top">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Тренер</th>
                        <th>Вместимость</th>
                        <th>Дата и время</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="l : ${lessons}">
                        <td th:text="${l.id}"></td>
                        <td th:text="${l.name}"></td>
                        <td th:text="${l.trainer.name}"></td>
                        <td th:text="${l.capacity}"></td>
                        <td th:text="${#temporals.format(l.dateTime,'dd.MM.yyyy HH:mm')}"></td>
                        <td>
                            <form th:action="@{/lessons/delete/{id}(id=${l.id})}" method="post" data-confirm-message="Удалить занятие?">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button class="button button-danger" type="submit">Удалить</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${lessons.isEmpty()}" class="empty-state spaced-top">Занятий пока нет. Создайте новый слот через форму справа.</div>
        </section>

        <aside class="panel">
            <p class="section-kicker">Создание</p>
            <h2 class="section-title">Новое занятие</h2>
            <form th:action="@{/lessons/add}" method="post" class="form-stack spaced-top">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="field">
                    <label for="name">Название</label>
                    <input id="name" name="name" required placeholder="Утренний функционал">
                </div>
                <div class="field">
                    <label for="capacity">Вместимость</label>
                    <input id="capacity" name="capacity" type="number" min="1" value="10" required>
                </div>
                <div class="field">
                    <label for="dateTime">Дата и время</label>
                    <input id="dateTime" type="datetime-local" name="dateTime" required>
                </div>
                <div class="field">
                    <label for="trainerSelect">Тренер</label>
                    <select id="trainerSelect" name="trainerId" required>
                        <option value="">Выберите тренера</option>
                        <option th:each="t : ${trainers}" th:value="${t.id}" th:text="${t.name + ' • ' + t.specialization}"></option>
                    </select>
                </div>
                <div class="action-row">
                    <button type="submit" class="button button-primary">Добавить</button>
                    <button type="reset" class="button button-secondary">Очистить</button>
                </div>
            </form>
        </aside>
    </section>
</main>
<script src="/js/theme.js"></script>
</body>
</html>
